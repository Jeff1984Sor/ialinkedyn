# Nginx — IALinkedyn (prod1)
# Acesso por PORTA (o IP:80 já é usado por outra aplicação / rca_final).
# Nginx escuta na porta 8080 e serve o IALinkedyn:
#   /      -> frontend Next.js  (127.0.0.1:3021)
#   /api/  -> API FastAPI        (127.0.0.1:8021)  [remove o prefixo /api]
#
# Acesso: http://SEU_IP:8080
# Firewall GCP: regra "ialinkedyn-8080" liberando tcp:8080.
#
# (Futuro) Se um dia houver subdomínio + DNS, dá pra migrar pra 80/443 + certbot.

server {
    listen 8080 default_server;
    server_name _;

    client_max_body_size 20M;

    # API -> backend (remove o /api do caminho)
    location /api/ {
        proxy_pass http://127.0.0.1:8021/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
