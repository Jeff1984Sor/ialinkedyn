# Nginx — IALinkedyn (prod1)
# Frontend (Next) em 127.0.0.1:3021, API (FastAPI) em 127.0.0.1:8021.
# O front chama a API por caminho relativo /api, que o Nginx encaminha
# pro backend removendo o prefixo /api.
#
# Depois de ter o subdomínio + DNS, trocar server_name e rodar o certbot.

server {
    listen 80;
    server_name ialinkedyn.mayacorp.com.br;

    client_max_body_size 20M;

    # API -> backend (remove o /api do caminho)
    location /api/ {
        proxy_pass http://127.0.0.1:8021/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
